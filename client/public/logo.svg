<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>

  <!-- UN: white, large -->
  <text
    x="256" y="222"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="158"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="central"
    textLength="380"
    lengthAdjust="spacingAndGlyphs"
  >UN</text>

  <!-- played: accent color, sized to match UN width exactly -->
  <text
    x="256" y="332"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="900"
    fill="#96d5c2"
    text-anchor="middle"
    dominant-baseline="central"
    textLength="380"
    lengthAdjust="spacingAndGlyphs"
  >played</text>
</svg>
