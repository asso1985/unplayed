<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c27"/>
      <stop offset="60%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#070710"/>
    </radialGradient>
    <radialGradient id="label" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8ff47"/>
      <stop offset="100%" stop-color="#c8df20"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>

  <!-- Outer vinyl disc -->
  <circle cx="256" cy="256" r="210" fill="url(#disc)"/>

  <!-- Vinyl grooves -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <circle cx="256" cy="256" r="188" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.05"/>
  <circle cx="256" cy="256" r="164" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <circle cx="256" cy="256" r="152" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.08"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.06"/>
  <circle cx="256" cy="256" r="116" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <circle cx="256" cy="256" r="104" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.05"/>

  <!-- Shimmer arc -->
  <path d="M 120 170 A 160 160 0 0 1 392 170" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.07" stroke-linecap="round"/>

  <!-- Center label -->
  <circle cx="256" cy="256" r="92" fill="url(#label)" filter="url(#subtle-glow)"/>
  <circle cx="256" cy="256" r="86" fill="none" stroke="#0a0a0f" stroke-width="1" opacity="0.15"/>
  <circle cx="256" cy="256" r="79" fill="none" stroke="#0a0a0f" stroke-width="0.5" opacity="0.1"/>

  <!-- UN / PLAYED stacked wordmark -->
  <text x="256" y="244" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="30" font-weight="900" fill="#0a0a0f"
    text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.5">UN</text>
  <text x="256" y="272" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="24" font-weight="900" fill="#0a0a0f"
    text-anchor="middle" dominant-baseline="middle" letter-spacing="-0.5">PLAYED</text>

  <!-- Spindle -->
  <circle cx="256" cy="256" r="10" fill="#0a0a0f" opacity="0.7"/>
  <circle cx="256" cy="256" r="6" fill="#0a0a0f"/>
  <circle cx="253" cy="253" r="1.5" fill="#ffffff" opacity="0.4"/>

  <!-- Rim -->
  <circle cx="256" cy="256" r="209" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <circle cx="256" cy="256" r="207" fill="none" stroke="#e8ff47" stroke-width="0.5" opacity="0.08" filter="url(#glow)"/>
</svg>
